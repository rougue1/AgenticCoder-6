[pytest]
# agentic-coder/ is the import root (modules use top-level imports like
# `from config import ...`); make it importable no matter where pytest is invoked.
pythonpath = .
testpaths = tests
markers =
    e2e: end-to-end tests that drive the real pipeline with SMALL Ollama models (opt-in via AIFORGE_E2E=1)
