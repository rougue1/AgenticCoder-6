# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║ AIForge configuration — SINGLE SOURCE OF TRUTH (two-tier redesign).             ║
# ║                                                                                  ║
# ║ Two model tiers run the whole pipeline:                                          ║
# ║   manager — plans, architects, hands off, escalates, decomposes, summarizes.     ║
# ║   worker  — implements + fixes in a tight tool-calling loop.                     ║
# ║                                                                                  ║
# ║ You only ever need to edit: model, temperature, context_window_pct,              ║
# ║ max_tokens_override, use_thinking. Everything else about a model (its true       ║
# ║ context window, its effective token budget, whether thinking actually works)     ║
# ║ is resolved automatically at startup from Ollama /api/show + a capability        ║
# ║ probe, into a RuntimeModelConfig all downstream code reads.                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

models:
  manager:
    # Discovered via `ollama list` on this machine: ornith:35b (qwen3.5-MoE 34.7B
    # Q4_K_M, ~21GB) — the strongest installed reasoner. Thinking-capable.
    model: "ornith:35b"
    temperature: 0.3
    # Fraction of the resolved context window reserved for INPUT (prompt) tokens;
    # the remainder is the model's room to answer/think.
    context_window_pct: 0.75
    # Set a number to hard-override the computed max_tokens; null = derive it as
    # int(num_ctx * context_window_pct) at startup.
    max_tokens_override: null
    use_thinking: true
  worker:
    # ornith:latest (qwen3.5 9B Q4_K_M, ~5.6GB) — small + fast for the tool loop.
    model: "ornith:latest"
    temperature: 0.1
    context_window_pct: 0.55
    max_tokens_override: null
    # NOTE: the worker NEVER thinks regardless of this flag — a hardcoded
    # architectural override (deliberation burns tokens in a tight tool loop with
    # no quality benefit). Setting true here only earns you a startup warning.
    use_thinking: false

pipeline:
  max_fix_retries: 3      # worker fix attempts per plan before escalating
  max_escalations: 2      # manager re-plans per subtask before decomposition
  max_decompositions: 1   # decomposition events per subtask before hard block
  tdd_hard_fail: true     # true: impl-before-test after 3 corrections = failed attempt
                          # false: log a warning and let the worker proceed untested

# Command execution is jailed by an OS-level bubblewrap (bwrap) sandbox: the
# workspace is the only writable path, sensitive dirs are hidden, commands run
# in a login shell (nvm/pyenv tools work), network stays shared. There is no
# command allowlist — any command runs, a small deny-list only fast-fails
# destructive ones (and git) plus foreground dev servers (use background mode).
sandbox:
  timeout: 60              # seconds per foreground command
  background_grace: 2.0    # seconds a background start is watched so instant crashes report their output
  session_tail_lines: 200  # log lines check_session returns from a background session
  stack_profile: auto      # auto | python | node — env strategy + preflight binaries

context:
  max_summary_tokens: 300   # cap per Manager-as-Analyst file summary
  max_handoff_tokens: 6000  # cap on the assembled Manager handoff context
  always_include:           # doc summaries always present in every handoff
    - architecture.md
    - requirements.md
  decision_log_max_entries: 20  # rolling window kept in .agent/decisions.md

server:
  host: 0.0.0.0
  port: 8765

# ── HARDWARE / RUNTIME TUNING (16GB VRAM + 32GB RAM box) ─────────────────────────
# Everything here is editable for a bigger (or smaller) machine.
ollama:
  host: "http://localhost:11434"
  # Ceiling on the per-request context window (num_ctx = KV-cache size, allocated
  # at model load — the dominant memory cost). The resolver takes
  # min(model's reported context, this cap). ornith models report 262144, which
  # would OOM instantly on 16GB VRAM; 32768 is the strong-but-safe value for this
  # box. Raise it if you upgrade (and set the Ollama server's
  # OLLAMA_CONTEXT_LENGTH at least this high so it isn't silently capped).
  max_num_ctx: 32768
  # keep_alive is DYNAMIC in effect: a model re-called consecutively (the worker
  # implement/fix loop, back-to-back manager calls) stays warm for this duration,
  # while a switch to a DIFFERENT model explicitly evicts the old one first (see
  # evict_on_model_switch). This value is just the warm window between
  # consecutive same-model calls.
  keep_alive: "10m"
  # true (right for <=16GB VRAM): never keep two DIFFERENT models resident — the
  # 21GB manager and the 5.6GB worker are unloaded/reloaded on switch so they can
  # never stack and OOM the runner. false: allow stacking (big-VRAM box; with
  # 24GB+ both ornith models could stay resident and swaps become free).
  evict_on_model_switch: true
  # Seconds of stream silence (no new token) before a call is treated as stalled.
  # Inter-frame, reset per chunk — tolerates long prefill on big context.
  stream_idle_timeout: 600
  # End-to-end ceiling litellm applies per request (a slow 35B thinking pass on
  # this box can legitimately take a long time).
  request_timeout: 3600
  # Timeout for the one-off startup thinking probe. Generous on purpose: it must
  # cover a cold model load into VRAM/RAM (30-60s+ for the 35B).
  probe_timeout: 120

# Leave blank to use the default AgenticCoder-6/sandbox/<slug>/ (slug derived
# from the prompt). --project-dir on the CLI overrides this.
project_dir: ""

# Per-call prompt/response dumps under .agent/llm_calls/{manager,worker}/ (JSONL).
dump_llm_calls: true
